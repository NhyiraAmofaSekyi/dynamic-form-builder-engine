name: Build Container, Push to Registry, and Deploy to EC2

on:
  push:
    branches: ["main"]
  workflow_dispatch:

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: ${{ toLower(github.repository) }}
  OWNER: ${{ toLower(github.repository_owner) }}

jobs:
  build_and_deploy:
    name: Build, Push to GHCR and Deploy
    runs-on: ubuntu-latest

    permissions:
      packages: write
      id-token: write
      contents: read

    steps:
      # =========================
      # Checkout
      # =========================
      - name: Checkout repository
        uses: actions/checkout@v4

      # =========================
      # Setup Docker Buildx
      # =========================
      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      # =========================
      # Login to GHCR
      # =========================
      - name: Log into GHCR
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      # =========================
      # CLIENT (Frontend)
      # =========================
      - name: Build & Push Client
        uses: docker/build-push-action@v5
        with:
          context: ./dynamic-form-builder
          file: ./dynamic-form-builder/Dockerfile
          push: true
          tags: |
            ghcr.io/${{ env.OWNER }}/dynamic-form-builder-client:latest
            ghcr.io/${{ env.OWNER }}/dynamic-form-builder-client:${{ github.sha }}

      # =========================
      # ENGINE (Backend)
      # =========================
      - name: Build & Push Engine
        uses: docker/build-push-action@v5
        with:
          context: ./dynamic-form-builder-engine
          file: ./dynamic-form-builder-engine/Dockerfile
          push: true
          tags: |
            ghcr.io/${{ env.OWNER }}/dynamic-form-builder-engine:latest
            ghcr.io/${{ env.OWNER }}/dynamic-form-builder-engine:${{ github.sha }}

      # =========================
      # AWS AUTH (OIDC)
      # =========================
      - name: Configure AWS Credentials
        uses: aws-actions/configure-aws-credentials@v6
        with:
          aws-region: af-south-1
          role-to-assume: arn:aws:iam::${{ secrets.AWS_ACCOUNT_ID }}:role/GitHub_Actions_Role_Personal

      # =========================
      # DEPLOY TO EC2 (via SSM)
      # =========================
      - name: Deploy to EC2
        run: |
          aws ssm send-command \
            --instance-ids ${{ secrets.EC2_INSTANCE_ID }} \
            --document-name "AWS-RunShellScript" \
            --parameters 'commands=[
              "cd /opt/staging",
              "echo ${{ secrets.GITHUB_TOKEN }} | docker login ghcr.io -u ${{ github.actor }} --password-stdin",
              "docker compose pull",
              "docker compose up -d --force-recreate",
              "docker system prune -af"
            ]' \
            --region af-south-1

      # =========================
      # VERIFY AWS AUTH
      # =========================

      - name: Configure AWS Credentials
        uses: aws-actions/configure-aws-credentials@v6.1.0
        with:
          aws-region: af-south-1
          role-to-assume: arn:aws:iam::${{ secrets.AWS_ACCOUNT_ID }}:role/GitHub_Actions_Role_Personal

      #      - name: Deploy to EC2
      #        run: |
      #          # Extract first tag from metadata JSON
      #          IMAGE_TAG=$(echo '${{ steps.meta.outputs.json }}' | jq -r '.tags[0]')
      #          echo "Deploying image: $IMAGE_TAG"
      #
      #          COMMAND_ID=$(aws ssm send-command \
      #            --instance-ids ${{secrets.EC2_INSTANCE_ID}} \
      #            --document-name "AWS-RunShellScript" \
      #            --parameters 'commands=[
      #              "cd /opt/staging/api",
      #              "echo ${{ secrets.GITHUB_TOKEN }} | docker login ghcr.io -u ${{ github.actor }} --password-stdin",
      #              "docker pull '"$IMAGE_TAG"'",
      #              "docker compose pull",
      #              "docker compose up -d --force-recreate",
      #              "docker compose ps",
      #              "docker system prune -af",
      #              "docker compose logs --tail 30 vyte-api"
      #            ]' \
      #            --region af-south-1 \
      #            --output text \
      #            --query "Command.CommandId")
      #
      #          echo "Command ID: $COMMAND_ID"
      #          sleep 15
      #
      #          aws ssm get-command-invocation \
      #            --command-id $COMMAND_ID \
      #            --instance-id ${{secrets.EC2_INSTANCE_ID}} \
      #            --region af-south-1 \
      #            --query "StandardOutputContent" \
      #            --output text

      - name: Get caller identity
        run: |
          echo "✅ Successfully authenticated as:"
          aws sts get-caller-identity

      - name: List files in /opt directory
        run: |
          echo "📂 Sending command to EC2..."

          COMMAND_ID=$(aws ssm send-command \
            --instance-ids ${{secrets.EC2_INSTANCE_ID}} \
            --document-name "AWS-RunShellScript" \
            --parameters 'commands=["ls -lah /opt"]' \
            --region af-south-1 \
            --output text \
            --query "Command.CommandId")

          echo "Command ID: $COMMAND_ID"
          sleep 10


          aws ssm get-command-invocation \
            --command-id $COMMAND_ID \
            --instance-id ${{secrets.EC2_INSTANCE_ID}} \
            --region af-south-1 \
            --query "StandardOutputContent" \
            --output text
