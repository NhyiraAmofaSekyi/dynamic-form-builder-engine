      #            --instance-ids ${{secrets.EC2_INSTANCE_ID}} \
      #            --document-name "AWS-RunShellScript" \
      #            --parameters 'commands=[
      #              "cd /opt/staging/api",
      #              "echo ${{ secrets.GITHUB_TOKEN }} | docker login ghcr.io -u ${{ github.actor }} --password-stdin",
      #              "docker pull '"$IMAGE_TAG"'",
      #              "docker compose pull",
