# Local development compose.
# Volume can be uncommented for persistence of the database.
services:
  db:
    image: postgres:18-alpine
    restart: unless-stopped
    environment:
      POSTGRES_DB: form_builder
      POSTGRES_USER: ${POSTGRES_USER:-formbuilder}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-localdevpassword}
    # volumes:
    #   - pgdata:/var/lib/postgresql
    ports:
      - "5432:5432"
    healthcheck:
      test:
        [
          "CMD-SHELL",
          "pg_isready -U ${POSTGRES_USER:-formbuilder} -d form_builder",
        ]
      interval: 5s
      timeout: 5s
      retries: 10

  api:
    build:
      context: ./dynamic-form-builder-engine
    restart: unless-stopped
    environment:
      DATABASE_URL: postgres://${POSTGRES_USER:-formbuilder}:${POSTGRES_PASSWORD:-localdevpassword}@db:5432/form_builder?sslmode=disable
      JWT_SECRET: ${JWT_SECRET:-local-dev-secret-change-me}
      PORT: "8080"
      SEED_TEST_PASSWORD: ${SEED_TEST_PASSWORD}
      CORS_ORIGINS: ${CORS_ORIGINS:-http://localhost:3000}
    depends_on:
      db:
        condition: service_healthy
    # Hit the API directly at http://localhost:8080
    # If seed Password is not added no test account will be created. Add SEED_TEST_PASSWORD to .env file to create a test account.
    ports:
      - "${API_PORT:-8080}:8080"

  web:
    build:
      context: ./dynamic-form-builder
      args:
        # Local: the SPA calls the API at localhost:8080 (baked in at build).
        VITE_API_BASE_URL: ${VITE_API_BASE_URL:-http://localhost:8080/api/v1}
    restart: unless-stopped
    # Open the app at http://localhost:3000
    ports:
      - "${WEB_PORT:-3000}:80"
    depends_on:
      - api

