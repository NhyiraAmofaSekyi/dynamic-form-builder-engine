# Local development compose. No Traefik, no TLS, no domains — just the three
# services with published ports so you hit them directly at localhost.
#   docker compose -f compose.local.yaml up --build

services:
  db:
    image: postgres:18-alpine
    restart: unless-stopped
    environment:
      POSTGRES_DB: form_builder
      POSTGRES_USER: ${POSTGRES_USER:-formbuilder}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-localdevpassword}
    volumes:
      - pgdata:/var/lib/postgresql
    # Published locally so you can inspect the DB with psql/a GUI if you want.
    ports:
      - "5432:5432"
    healthcheck:
      test:
        [
          "CMD-SHELL",
          "pg_isready -U ${POSTGRES_USER:-formbuilder} -d form_builder",
        ]
      interval: 5s
      timeout: 5s
      retries: 10

  api:
    build:
      context: ./dynamic-form-builder-engine
    restart: unless-stopped
    environment:
      DATABASE_URL: postgres://${POSTGRES_USER:-formbuilder}:${POSTGRES_PASSWORD:-localdevpassword}@db:5432/form_builder?sslmode=disable
      JWT_SECRET: ${JWT_SECRET:-local-dev-secret-change-me}
      PORT: "8080"
    depends_on:
      db:
        condition: service_healthy
    # Hit the API directly at http://localhost:8080
    ports:
      - "8080:8080"

  web:
    build:
      context: ./dynamic-form-builder
      args:
        # Local: the SPA calls the API at localhost:8080 (baked in at build).
        VITE_API_BASE_URL: http://localhost:8080/api/v1
    restart: unless-stopped
    # Open the app at http://localhost:3000
    ports:
      - "3000:80"
    depends_on:
      - api

volumes:
  pgdata:
