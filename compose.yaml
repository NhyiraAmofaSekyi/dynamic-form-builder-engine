services:
  db:
    image: postgres:18-alpine
    restart: always
    environment:
      POSTGRES_DB: form_builder
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
    volumes:
      # PG18 stores data in a versioned subdir — mount the PARENT, not /data.
      - pgdata:/var/lib/postgresql
    networks:
      - internal
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER} -d form_builder"]
      interval: 5s
      timeout: 5s
      retries: 10

  api:
    image: ghcr.io/nhyiraamofasekyi/dynamic-form-builder-engine:latest
    restart: always
    environment:
      DATABASE_URL: postgres://${POSTGRES_USER}:${POSTGRES_PASSWORD}@db:5432/form_builder?sslmode=disable
      JWT_SECRET: ${JWT_SECRET}
      HOST: ${HOST}
      PORT: "8080"
    depends_on:
      db:
        condition: service_healthy
    networks:
      - internal
      - traefik
    labels:
      - "traefik.enable=true"
      - "traefik.docker.network=traefik_default"
      - "traefik.http.routers.api.rule=Host(`api-formbuilder.nhyiraamofasekyi.com`)"
      - "traefik.http.routers.api.entrypoints=https"
      - "traefik.http.routers.api.tls=true"
      - "traefik.http.services.api.loadbalancer.server.port=8080"

  web:
    image: ghcr.io/nhyiraamofasekyi/dynamic-form-builder-client:latest
    restart: always
    networks:
      - traefik
    labels:
      - "traefik.enable=true"
      - "traefik.docker.network=traefik_default"
      - "traefik.http.routers.web.rule=Host(`formbuilder.nhyiraamofasekyi.com`)"
      - "traefik.http.routers.web.entrypoints=https"
      - "traefik.http.routers.web.tls=true"
      - "traefik.http.services.web.loadbalancer.server.port=80"

volumes:
  pgdata:

networks:
  internal:
  traefik:
    external: true
    name: traefik
